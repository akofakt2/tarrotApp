<!doctype html>
<html lang="{{ locale }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deck</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <section>
        <div class="header">
          <h1 class="title">Shuffled deck</h1>
        </div>

        <p class="hint">
          Back of card (same folder as faces): <code class="mono">{{ deck_back }}</code>
        </p>
        <div style="max-width: 140px; margin-top: 8px;">
          <img
            src="{{ url_for('static', filename=card_images_dir ~ '/' ~ deck_back) }}"
            alt=""
            class="card-img"
            loading="lazy"
          />
        </div>

        <p class="hint" style="margin-top: 12px;">
          Náhodné poradie všetkých 78 kariet a náhodná orientácia (upright/reversed).
        </p>
      </section>

      <section class="panel">
        <div class="minor-grid">
          {% for c, o in deck_cards %}
            <div class="card">
              <img
                src="{{ url_for('static', filename=card_images_dir ~ '/' ~ c.image_path) }}"
                alt="{{ c.name }}"
                loading="lazy"
                class="card-img"
                style="{% if o == 'reversed' %}transform: rotate(180deg);{% endif %}"
              />
              <div class="card-title">{{ c.id }}. {{ c.name }}</div>
              <div class="small">
                Orientation: <span class="mono">{{ o }}</span>
              </div>
            </div>
          {% endfor %}
        </div>
      </section>
    </main>
  </body>
</html>
